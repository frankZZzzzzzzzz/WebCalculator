<!DOCTYPE html>

<html>
    <head>
        <Title>Calculator</Title>
        <meta charset="UTF-8">
        <meta name="description" content="Simple Calculator with parenthesis support">
        <meta name="keywords" content="Calculator,Parenthesis">
        <meta name="authro" content="Frank Zhang">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Layout.css">
    </head>
    <body>
        <div id="Whole-Calculator">
            <div id="bar"><span id="barText"></span></div>
            <div id="Buttons">
                <button class="Calculator-Buttons" id="btn-op-openParenthesis">(</button>
                <button class="Calculator-Buttons" id="btn-op-closeParenthesis">)</button>

                <button class="Calculator-Buttons" id="btn-op-clear">CS</button>
                <button class="Calculator-Buttons" id="btn-op-backspace">&lt;-</button>
                <button class="Calculator-Buttons" id="btn-op-divide">/</button>
                <button class="Calculator-Buttons" id="btn-op-multiply">*</button>

                <button class="Calculator-Buttons" id="btn-number-7">7</button>
                <button class="Calculator-Buttons" id="btn-number-8">8</button>
                <button class="Calculator-Buttons" id="btn-number-9">9</button>
                <button class="Calculator-Buttons" id="btn-op-subtract">-</button>

                <button class="Calculator-Buttons" id="btn-number-4">4</button>
                <button class="Calculator-Buttons" id="btn-number-5">5</button>
                <button class="Calculator-Buttons" id="btn-number-6">6</button>
                <button class="Calculator-Buttons" id="btn-op-add">+</button>

                <button class="Calculator-Buttons" id="btn-number-1">1</button>
                <button class="Calculator-Buttons" id="btn-number-2">2</button>
                <button class="Calculator-Buttons" id="btn-number-3">3</button>
                <button class="Calculator-Buttons" id="btn-op-equals">=</button>

                <button class="Calculator-Buttons" id="btn-op-plus-minus"> +/-</button>
                <button class="Calculator-Buttons" id="btn-number-0">0</button>
                <button class="Calculator-Buttons" id="btn-op-decimal">.</button>
            </div>
            <script src="Calculator.js"></script>
        </div>
    </body>
</html>
